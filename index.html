<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Do'kon</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --accent: #FF6B35;
    --accent2: #FFD23F;
    --dark: #1a1a2e;
    --card: rgba(255,255,255,0.08);
    --text: #ffffff;
    --text2: rgba(255,255,255,0.6);
    --radius: 18px;
    --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background: var(--dark);
    color: var(--text);
  }

  /* === BACKGROUND === */
  #bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background-image: url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=800');
    background-size: cover;
    background-position: center;
    transition: background-image var(--transition);
  }
  #bg-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: linear-gradient(180deg, rgba(26,26,46,0.7) 0%, rgba(26,26,46,0.92) 100%);
  }

  /* === APP === */
  #app { position: relative; z-index: 2; min-height: 100vh; }

  /* === HEADER === */
  header {
    padding: 16px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    position: sticky; top:0; z-index:100;
    background: rgba(26,26,46,0.6);
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .header-icons { display:flex; gap:10px; }
  .icon-btn {
    width:40px; height:40px; border-radius:12px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition: var(--transition); font-size:18px;
    backdrop-filter: blur(4px);
  }
  .icon-btn:active { transform: scale(0.9); background: var(--accent); }
  .cart-badge {
    position:relative;
  }
  .badge {
    position:absolute; top:-4px; right:-4px;
    background: var(--accent); color:#fff;
    font-size:10px; font-weight:700;
    width:18px; height:18px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    display:none;
  }
  .badge.show { display:flex; }

  /* === PAGES === */
  .page { display:none; padding: 20px; }
  .page.active { display:block; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to { opacity:1; transform:translateY(0); }
  }

  /* === SEARCH === */
  .search-wrap {
    position:relative; margin-bottom: 20px;
  }
  .search-wrap input {
    width:100%; padding: 13px 16px 13px 44px;
    border-radius: 14px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.08);
    color:#fff; font-size:14px; font-family:'DM Sans',sans-serif;
    outline:none; backdrop-filter: blur(4px);
    transition: var(--transition);
  }
  .search-wrap input:focus { border-color: var(--accent); background: rgba(255,107,53,0.08); }
  .search-wrap input::placeholder { color: rgba(255,255,255,0.35); }
  .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:18px; opacity:0.5; }

  /* === CATEGORIES === */
  .cats {
    display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; margin-bottom:20px;
    scrollbar-width:none;
  }
  .cats::-webkit-scrollbar { display:none; }
  .cat-btn {
    padding: 8px 18px; border-radius:30px; white-space:nowrap;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.07);
    color: var(--text2); font-size:13px; font-weight:500;
    cursor:pointer; transition: var(--transition);
    font-family: 'DM Sans', sans-serif;
  }
  .cat-btn.active {
    background: var(--accent); border-color: var(--accent);
    color:#fff; font-weight:600;
  }

  /* === SECTION TITLE === */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size:20px; font-weight:700; margin-bottom:16px;
  }

  /* === PRODUCTS GRID === */
  .products { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

  .product-card {
    background: rgba(255,255,255,0.07);
    border-radius: var(--radius);
    overflow:hidden;
    border: 1px solid rgba(255,255,255,0.1);
    cursor:pointer;
    transition: var(--transition);
    backdrop-filter: blur(6px);
  }
  .product-card:active { transform: scale(0.97); }
  .product-img {
    width:100%; aspect-ratio:1;
    object-fit:cover;
    background: rgba(255,255,255,0.05);
    display:flex; align-items:center; justify-content:center;
    font-size:48px;
  }
  .product-img img { width:100%; height:100%; object-fit:cover; }
  .product-info { padding: 12px; }
  .product-name { font-size:13px; font-weight:600; margin-bottom:4px; line-height:1.3; }
  .product-price {
    font-size:15px; font-weight:700;
    color: var(--accent);
  }
  .product-old {
    font-size:11px; color: var(--text2); text-decoration:line-through; margin-left:4px;
  }
  .add-btn {
    width:100%; margin-top:10px;
    padding: 9px;
    border-radius:10px;
    border:none;
    background: linear-gradient(135deg, var(--accent), #ff8c5a);
    color:#fff; font-weight:600; font-size:13px;
    cursor:pointer; transition: var(--transition);
    font-family: 'DM Sans', sans-serif;
  }
  .add-btn:active { transform:scale(0.96); opacity:0.85; }

  /* === CART === */
  .cart-list { display:flex; flex-direction:column; gap:14px; }
  .cart-item {
    display:flex; gap:14px; align-items:center;
    background: rgba(255,255,255,0.07);
    border-radius:14px; padding:14px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .cart-item-img {
    width:60px; height:60px; border-radius:10px;
    background: rgba(255,255,255,0.1);
    display:flex; align-items:center; justify-content:center;
    font-size:28px; flex-shrink:0; overflow:hidden;
  }
  .cart-item-img img { width:100%; height:100%; object-fit:cover; }
  .cart-item-info { flex:1; }
  .cart-item-name { font-size:14px; font-weight:600; margin-bottom:4px; }
  .cart-item-price { font-size:13px; color:var(--accent); font-weight:700; }
  .qty-ctrl { display:flex; align-items:center; gap:8px; margin-top:8px; }
  .qty-btn {
    width:28px; height:28px; border-radius:8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color:#fff; font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: var(--transition);
  }
  .qty-btn:active { background: var(--accent); border-color:var(--accent); }
  .qty-num { font-size:14px; font-weight:700; min-width:20px; text-align:center; }
  .remove-btn { font-size:20px; cursor:pointer; opacity:0.5; transition: var(--transition); }
  .remove-btn:active { opacity:1; color:#ff4444; }

  .cart-total {
    background: rgba(255,107,53,0.12);
    border-radius: var(--radius);
    padding: 18px; margin-top:20px;
    border: 1px solid rgba(255,107,53,0.3);
  }
  .total-row { display:flex; justify-content:space-between; margin-bottom:8px; }
  .total-label { color:var(--text2); font-size:14px; }
  .total-value { font-weight:700; font-size:14px; }
  .total-final { font-size:18px; color:var(--accent); }

  .checkout-btn {
    width:100%; padding:16px;
    border-radius:14px; border:none;
    background: linear-gradient(135deg, var(--accent), #ff8c5a);
    color:#fff; font-size:16px; font-weight:700;
    cursor:pointer; margin-top:16px;
    font-family: 'DM Sans', sans-serif;
    transition: var(--transition);
    box-shadow: 0 8px 24px rgba(255,107,53,0.4);
  }
  .checkout-btn:active { transform:scale(0.97); }

  .empty-cart {
    text-align:center; padding: 60px 20px;
    color: var(--text2);
  }
  .empty-cart .emoji { font-size:64px; display:block; margin-bottom:16px; }
  .empty-cart p { font-size:16px; }

  /* === ADMIN PANEL === */
  .admin-card {
    background: rgba(255,255,255,0.07);
    border-radius: var(--radius);
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.12);
    margin-bottom:16px;
    backdrop-filter: blur(6px);
  }
  .admin-card h3 {
    font-family:'Playfair Display',serif;
    font-size:16px; margin-bottom:16px;
    color: var(--accent2);
  }
  label { font-size:13px; color:var(--text2); display:block; margin-bottom:6px; }
  input[type=text], input[type=number], textarea, select {
    width:100%; padding:12px 14px;
    border-radius:12px; border:1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.08);
    color:#fff; font-size:14px; font-family:'DM Sans',sans-serif;
    outline:none; margin-bottom:14px;
    transition: var(--transition);
  }
  input[type=text]:focus, input[type=number]:focus, textarea:focus {
    border-color: var(--accent); background: rgba(255,107,53,0.08);
  }
  textarea { resize:none; height:80px; }
  select option { background:#1a1a2e; }

  .bg-grid {
    display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:12px;
  }
  .bg-thumb {
    aspect-ratio:1; border-radius:12px; overflow:hidden;
    cursor:pointer; transition: var(--transition);
    border: 2px solid transparent;
    background-size:cover; background-position:center;
    display:flex; align-items:flex-end; padding:6px;
  }
  .bg-thumb:active { transform:scale(0.94); }
  .bg-thumb.selected { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,107,53,0.3); }
  .bg-thumb span {
    font-size:10px; background:rgba(0,0,0,0.6);
    border-radius:4px; padding:2px 6px; color:#fff;
  }

  .upload-bg {
    width:100%; padding:12px;
    border-radius:12px; border: 2px dashed rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color:var(--text2); font-size:13px;
    text-align:center; cursor:pointer;
    transition: var(--transition);
    font-family: 'DM Sans', sans-serif;
    margin-top:10px;
  }
  .upload-bg:active { border-color:var(--accent); color:var(--accent); }

  .save-btn {
    width:100%; padding:14px;
    border-radius:12px; border:none;
    background: linear-gradient(135deg, #16a34a, #22c55e);
    color:#fff; font-size:15px; font-weight:700;
    cursor:pointer; font-family:'DM Sans',sans-serif;
    transition: var(--transition);
    margin-top:4px;
  }
  .save-btn:active { transform:scale(0.97); opacity:0.85; }

  .product-list-admin { display:flex; flex-direction:column; gap:10px; }
  .admin-product-item {
    display:flex; align-items:center; gap:12px;
    background: rgba(255,255,255,0.05);
    border-radius:12px; padding:12px;
    border:1px solid rgba(255,255,255,0.08);
  }
  .admin-product-item .emoji { font-size:28px; }
  .admin-product-item .info { flex:1; }
  .admin-product-item .info strong { font-size:13px; display:block; }
  .admin-product-item .info span { font-size:12px; color:var(--accent); }
  .del-btn {
    background: rgba(255,68,68,0.15); border:none;
    color:#ff4444; width:32px; height:32px;
    border-radius:8px; cursor:pointer; font-size:16px;
    transition: var(--transition);
  }
  .del-btn:active { background:rgba(255,68,68,0.4); }

  /* === BOTTOM NAV === */
  nav {
    position:fixed; bottom:0; left:0; right:0;
    background: rgba(26,26,46,0.85);
    backdrop-filter: blur(16px);
    border-top: 1px solid rgba(255,255,255,0.1);
    display:flex; z-index:100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex:1; padding:12px 0 10px;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    cursor:pointer; transition: var(--transition);
    border:none; background:none; color:var(--text2);
    font-family:'DM Sans',sans-serif;
  }
  .nav-btn .nav-icon { font-size:22px; transition: var(--transition); }
  .nav-btn .nav-label { font-size:10px; font-weight:600; letter-spacing:0.3px; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.active .nav-icon { transform:translateY(-2px); }

  /* === TOAST === */
  #toast {
    position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
    background: rgba(255,107,53,0.95);
    color:#fff; padding:10px 22px; border-radius:30px;
    font-size:13px; font-weight:600;
    opacity:0; transition: all 0.3s ease; z-index:999;
    white-space:nowrap; pointer-events:none;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* === PASSWORD MODAL === */
  #pwd-modal {
    position:fixed; inset:0; z-index:200;
    background: rgba(0,0,0,0.7); backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    padding:30px;
  }
  .pwd-box {
    background: #1a1a2e; border-radius:20px;
    padding:28px; width:100%; max-width:320px;
    border:1px solid rgba(255,255,255,0.15);
  }
  .pwd-box h3 { font-family:'Playfair Display',serif; margin-bottom:8px; font-size:20px; }
  .pwd-box p { font-size:13px; color:var(--text2); margin-bottom:20px; }
  .pwd-input {
    width:100%; padding:14px;
    border-radius:12px; border:1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color:#fff; font-size:16px; text-align:center;
    letter-spacing:4px; outline:none; font-family:'DM Sans',sans-serif;
    margin-bottom:14px;
  }
  .pwd-btn {
    width:100%; padding:14px; border-radius:12px; border:none;
    background:linear-gradient(135deg, var(--accent), #ff8c5a);
    color:#fff; font-weight:700; font-size:15px;
    cursor:pointer; font-family:'DM Sans',sans-serif;
  }

  .content-pad { padding-bottom: 80px; }
</style>
</head>
<body>

<div id="bg-layer"></div>
<div id="bg-overlay"></div>
<div id="app">

  <header>
    <div class="logo">🛍 ShopBot</div>
    <div class="header-icons">
      <div class="icon-btn cart-badge" onclick="goPage('cart')">
        🛒
        <div class="badge" id="cart-badge">0</div>
      </div>
      <div class="icon-btn" onclick="openAdmin()">⚙️</div>
    </div>
  </header>

  <!-- HOME PAGE -->
  <div class="page active content-pad" id="page-home">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Mahsulot qidiring..." id="search-input" oninput="filterProducts()">
    </div>
    <div class="cats" id="cats-wrap"></div>
    <div class="section-title" id="products-title">Barcha mahsulotlar</div>
    <div class="products" id="products-grid"></div>
  </div>

  <!-- CART PAGE -->
  <div class="page content-pad" id="page-cart">
    <div class="section-title">🛒 Savatcha</div>
    <div id="cart-content"></div>
  </div>

  <!-- ADMIN PAGE -->
  <div class="page content-pad" id="page-admin">
    <div class="section-title">⚙️ Admin Panel</div>

    <div class="admin-card">
      <h3>🖼 Orqa fon rasmi</h3>
      <div class="bg-grid" id="bg-grid"></div>
      <input type="file" id="bg-upload" accept="image/*" style="display:none" onchange="uploadBg(event)">
      <button class="upload-bg" onclick="document.getElementById('bg-upload').click()">
        📁 O'z rasmingizni yuklang
      </button>
    </div>

    <div class="admin-card">
      <h3>➕ Yangi mahsulot qo'shish</h3>
      <label>Mahsulot nomi</label>
      <input type="text" id="p-name" placeholder="Masalan: Nike Air Max">
      <label>Narxi (so'm)</label>
      <input type="number" id="p-price" placeholder="150000">
      <label>Eski narxi (ixtiyoriy)</label>
      <input type="number" id="p-old" placeholder="200000">
      <label>Kategoriya</label>
      <input type="text" id="p-cat" placeholder="Poyabzal">
      <label>Emoji yoki rasm URL</label>
      <input type="text" id="p-img" placeholder="👟 yoki https://...">
      <label>Tavsif</label>
      <textarea id="p-desc" placeholder="Mahsulot haqida..."></textarea>
      <button class="save-btn" onclick="addProduct()">✅ Qo'shish</button>
    </div>

    <div class="admin-card">
      <h3>📦 Mavjud mahsulotlar</h3>
      <div class="product-list-admin" id="admin-product-list"></div>
    </div>
  </div>

  <nav>
    <button class="nav-btn active" onclick="goPage('home')" id="nav-home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Asosiy</span>
    </button>
    <button class="nav-btn" onclick="goPage('cart')" id="nav-cart">
      <span class="nav-icon">🛒</span>
      <span class="nav-label">Savat</span>
    </button>
    <button class="nav-btn" onclick="openAdmin()" id="nav-admin">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Admin</span>
    </button>
  </nav>
</div>

<div id="toast"></div>

<!-- PASSWORD MODAL -->
<div id="pwd-modal" style="display:none">
  <div class="pwd-box">
    <h3>🔐 Admin Panel</h3>
    <p>Admin paneliga kirish uchun parolni kiriting</p>
    <input type="password" class="pwd-input" id="pwd-input" placeholder="••••••" maxlength="8" onkeydown="if(event.key==='Enter')checkPwd()">
    <button class="pwd-btn" onclick="checkPwd()">Kirish</button>
  </div>
</div>

<script>
// === DATA ===
let products = JSON.parse(localStorage.getItem('shop_products') || 'null') || [
  {id:1, name:"Nike Air Max 270", price:850000, old:1200000, cat:"Poyabzal", img:"👟", desc:"Yuqori sifatli sport poyabzal"},
  {id:2, name:"iPhone 15 Pro", price:15900000, old:18000000, cat:"Telefonlar", img:"📱", desc:"Kuchli va chiroyli smartfon"},
  {id:3, name:"AirPods Pro", price:2800000, old:3500000, cat:"Aksessuarlar", img:"🎧", desc:"Shovqinsiz quloqchin"},
  {id:4, name:"MacBook Air M3", price:22500000, old:0, cat:"Noutbuklar", img:"💻", desc:"Eng yengil noutbuk"},
  {id:5, name:"Samsung Galaxy S24", price:12000000, old:14000000, cat:"Telefonlar", img:"📲", desc:"Ultra kamera"},
  {id:6, name:"Adidas Ultraboost", price:980000, old:0, cat:"Poyabzal", img:"👟", desc:"Yugurish poyabzali"},
];
let cart = JSON.parse(localStorage.getItem('shop_cart') || '[]');
let currentPage = 'home';
let currentCat = 'Barchasi';
let adminUnlocked = false;
const ADMIN_PASS = '1234';

const bgOptions = [
  {url:'https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=800', label:'Do\'kon'},
  {url:'https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800', label:'Boutique'},
  {url:'https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?w=800', label:'Stil'},
  {url:'https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=800', label:'Luxe'},
  {url:'https://images.unsplash.com/photo-1472851294608-062f824d29cc?w=800', label:'Market'},
  {url:'https://images.unsplash.com/photo-1598300042247-d088f8ab3a91?w=800', label:'Fashion'},
];
let currentBg = localStorage.getItem('shop_bg') || bgOptions[0].url;

// === INIT ===
function init() {
  document.getElementById('bg-layer').style.backgroundImage = `url('${currentBg}')`;
  renderCategories();
  renderProducts();
  updateCartBadge();
  renderBgGrid();
}

// === PAGES ===
function goPage(page) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('nav-'+page)?.classList.add('active');
  currentPage = page;
  if(page==='cart') renderCart();
  if(page==='admin') { renderAdminProducts(); renderBgGrid(); }
}

// === CATEGORIES ===
function getCategories() {
  const cats = ['Barchasi', ...new Set(products.map(p=>p.cat))];
  return cats;
}

function renderCategories() {
  const wrap = document.getElementById('cats-wrap');
  const cats = getCategories();
  wrap.innerHTML = cats.map(c=>`
    <button class="cat-btn ${c===currentCat?'active':''}" onclick="selectCat('${c}')">${c}</button>
  `).join('');
}

function selectCat(cat) {
  currentCat = cat;
  renderCategories();
  renderProducts();
  document.getElementById('products-title').textContent = cat === 'Barchasi' ? 'Barcha mahsulotlar' : cat;
}

// === PRODUCTS ===
function renderProducts() {
  const query = document.getElementById('search-input')?.value?.toLowerCase()||'';
  let list = products;
  if(currentCat !== 'Barchasi') list = list.filter(p=>p.cat===currentCat);
  if(query) list = list.filter(p=>p.name.toLowerCase().includes(query));

  const grid = document.getElementById('products-grid');
  if(!list.length) {
    grid.innerHTML = '<div style="grid-column:span 2;text-align:center;padding:40px;color:rgba(255,255,255,0.4)">Mahsulot topilmadi 😔</div>';
    return;
  }
  grid.innerHTML = list.map(p=>{
    const isUrl = p.img.startsWith('http');
    const imgHtml = isUrl
      ? `<img src="${p.img}" alt="${p.name}" onerror="this.parentNode.innerHTML='🛍'">`
      : p.img;
    const oldPrice = p.old ? `<span class="product-old">${fmt(p.old)}</span>` : '';
    return `
      <div class="product-card">
        <div class="product-img">${imgHtml}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div style="display:flex;align-items:baseline;gap:4px">
            <span class="product-price">${fmt(p.price)}</span>${oldPrice}
          </div>
          <button class="add-btn" onclick="addToCart(${p.id})">+ Savatga</button>
        </div>
      </div>`;
  }).join('');
}

function filterProducts() { renderProducts(); }

// === CART ===
function addToCart(id) {
  const p = products.find(x=>x.id===id);
  if(!p) return;
  const ex = cart.find(x=>x.id===id);
  if(ex) ex.qty++;
  else cart.push({...p, qty:1});
  saveCart();
  updateCartBadge();
  showToast(`✅ ${p.name} savatga qo'shildi`);
}

function updateCartBadge() {
  const total = cart.reduce((s,i)=>s+i.qty,0);
  const badge = document.getElementById('cart-badge');
  badge.textContent = total;
  badge.classList.toggle('show', total>0);
}

function renderCart() {
  const wrap = document.getElementById('cart-content');
  if(!cart.length) {
    wrap.innerHTML = `<div class="empty-cart"><span class="emoji">🛒</span><p>Savatingiz bo'sh<br>Mahsulot qo'shing!</p></div>`;
    return;
  }
  const subtotal = cart.reduce((s,i)=>s+i.price*i.qty, 0);
  const delivery = 15000;
  const total = subtotal + delivery;

  wrap.innerHTML = `
    <div class="cart-list">
      ${cart.map(item=>{
        const isUrl = item.img.startsWith('http');
        const imgHtml = isUrl ? `<img src="${item.img}" alt="">` : item.img;
        return `
          <div class="cart-item">
            <div class="cart-item-img">${imgHtml}</div>
            <div class="cart-item-info">
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-price">${fmt(item.price * item.qty)}</div>
              <div class="qty-ctrl">
                <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
                <span class="qty-num">${item.qty}</span>
                <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
              </div>
            </div>
            <span class="remove-btn" onclick="removeItem(${item.id})">🗑</span>
          </div>`;
      }).join('')}
    </div>
    <div class="cart-total">
      <div class="total-row"><span class="total-label">Mahsulotlar</span><span class="total-value">${fmt(subtotal)}</span></div>
      <div class="total-row"><span class="total-label">Yetkazib berish</span><span class="total-value">${fmt(delivery)}</span></div>
      <div class="total-row" style="border-top:1px solid rgba(255,255,255,0.1);padding-top:10px;margin-top:4px">
        <span class="total-label" style="font-weight:700;color:#fff">Jami</span>
        <span class="total-value total-final">${fmt(total)}</span>
      </div>
    </div>
    <button class="checkout-btn" onclick="checkout()">🚀 Buyurtma berish</button>
  `;
}

function changeQty(id, delta) {
  const item = cart.find(x=>x.id===id);
  if(!item) return;
  item.qty += delta;
  if(item.qty<=0) cart = cart.filter(x=>x.id!==id);
  saveCart(); updateCartBadge(); renderCart();
}

function removeItem(id) {
  cart = cart.filter(x=>x.id!==id);
  saveCart(); updateCartBadge(); renderCart();
}

function checkout() {
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0) + 15000;
  const list = cart.map(i=>`${i.name} x${i.qty}`).join(', ');
  if(window.Telegram?.WebApp) {
    Telegram.WebApp.sendData(JSON.stringify({action:'order', items:cart, total}));
  } else {
    showToast(`✅ Buyurtma qabul qilindi! ${fmt(total)}`);
    cart = []; saveCart(); updateCartBadge(); renderCart();
  }
}

function saveCart() {
  localStorage.setItem('shop_cart', JSON.stringify(cart));
}

// === ADMIN ===
function openAdmin() {
  if(adminUnlocked) { goPage('admin'); return; }
  document.getElementById('pwd-modal').style.display='flex';
  document.getElementById('pwd-input').value='';
  setTimeout(()=>document.getElementById('pwd-input').focus(),100);
}

function checkPwd() {
  const val = document.getElementById('pwd-input').value;
  if(val===ADMIN_PASS) {
    adminUnlocked = true;
    document.getElementById('pwd-modal').style.display='none';
    goPage('admin');
  } else {
    document.getElementById('pwd-input').style.borderColor='#ff4444';
    setTimeout(()=>document.getElementById('pwd-input').style.borderColor='',1000);
    showToast('❌ Noto\'g\'ri parol!');
  }
}

function addProduct() {
  const name = document.getElementById('p-name').value.trim();
  const price = +document.getElementById('p-price').value;
  const old = +document.getElementById('p-old').value||0;
  const cat = document.getElementById('p-cat').value.trim()||'Boshqa';
  const img = document.getElementById('p-img').value.trim()||'🛍';
  const desc = document.getElementById('p-desc').value.trim();
  if(!name||!price) { showToast('❗ Nom va narxni kiriting'); return; }
  const newP = {id: Date.now(), name, price, old, cat, img, desc};
  products.push(newP);
  saveProducts();
  renderAdminProducts();
  renderCategories();
  ['p-name','p-price','p-old','p-cat','p-img','p-desc'].forEach(id=>document.getElementById(id).value='');
  showToast('✅ Mahsulot qo\'shildi!');
}

function deleteProduct(id) {
  products = products.filter(p=>p.id!==id);
  cart = cart.filter(c=>c.id!==id);
  saveProducts(); saveCart(); updateCartBadge();
  renderAdminProducts(); renderCategories();
  showToast('🗑 Mahsulot o\'chirildi');
}

function renderAdminProducts() {
  const wrap = document.getElementById('admin-product-list');
  if(!products.length) { wrap.innerHTML='<p style="color:var(--text2);font-size:13px">Mahsulotlar yo\'q</p>'; return; }
  wrap.innerHTML = products.map(p=>`
    <div class="admin-product-item">
      <span class="emoji">${p.img.startsWith('http')?'🖼':p.img}</span>
      <div class="info">
        <strong>${p.name}</strong>
        <span>${fmt(p.price)} · ${p.cat}</span>
      </div>
      <button class="del-btn" onclick="deleteProduct(${p.id})">🗑</button>
    </div>
  `).join('');
}

function saveProducts() {
  localStorage.setItem('shop_products', JSON.stringify(products));
}

// === BACKGROUND ===
function renderBgGrid() {
  const grid = document.getElementById('bg-grid');
  const userBg = localStorage.getItem('shop_custom_bg');
  let options = [...bgOptions];
  if(userBg) options = [{url:userBg, label:'Mening'}, ...options.slice(0,5)];
  grid.innerHTML = options.map(bg=>`
    <div class="bg-thumb ${currentBg===bg.url?'selected':''}"
      style="background-image:url('${bg.url}')"
      onclick="setBg('${bg.url}')">
      <span>${bg.label}</span>
    </div>
  `).join('');
}

function setBg(url) {
  currentBg = url;
  localStorage.setItem('shop_bg', url);
  document.getElementById('bg-layer').style.backgroundImage = `url('${url}')`;
  renderBgGrid();
  showToast('✅ Orqa fon o\'zgartirildi!');
}

function uploadBg(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const url = ev.target.result;
    localStorage.setItem('shop_custom_bg', url);
    setBg(url);
  };
  reader.readAsDataURL(file);
}

// === UTILS ===
function fmt(n) {
  return n.toLocaleString('uz-UZ') + " so'm";
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// === TELEGRAM INIT ===
if(window.Telegram?.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

init();
</script>
</body>
</html>
